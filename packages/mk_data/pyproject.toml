[project]
name = "mk-data"
version = "0.1.0"
description = "Data ingestion and lakehouse package for MK122"
requires-python = ">=3.11"
dependencies = [
    "deltalake>=0.22",
    "duckdb>=1.0",
    "mk-common",
    "pandas>=2.2",
    "pyarrow>=14.0",
    "pydantic>=2.8",
    "tushare>=1.2.10",
]

[project.scripts]
mk-data-fetch-daily = "mk_data.cli:main"

[tool.uv.sources]
mk-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mk_data"]
