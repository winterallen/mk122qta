[project]
name = "mk-chaos"
version = "0.1.0"
description = "Chaos engineering, resilience scoring, and rule replay primitives for MK122 P5"
requires-python = ">=3.11"
dependencies = [
    "mk-simulation",
]

[tool.uv.sources]
mk-simulation = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mk_chaos"]
