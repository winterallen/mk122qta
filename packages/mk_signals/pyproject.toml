[project]
name = "mk-signals"
version = "0.1.0"
description = "Factor scoring and signal primitives for MK122 P1"
requires-python = ">=3.11"
dependencies = [
    "mk-data",
]

[tool.uv.sources]
mk-data = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mk_signals"]
