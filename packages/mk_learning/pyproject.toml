[project]
name = "mk-learning"
version = "0.1.0"
description = "Online learning, drift detection, and model zoo primitives for MK122 P4"
requires-python = ">=3.11"
dependencies = [
    "mk-observability",
]

[tool.uv.sources]
mk-observability = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mk_learning"]
