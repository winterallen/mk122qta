[project]
name = "mk-meta"
version = "0.1.0"
description = "Meta scheduler, circuit breaker, and allocation primitives for MK122 P3"
requires-python = ">=3.11"
dependencies = [
    "mk-observability",
]

[tool.uv.sources]
mk-observability = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mk_meta"]
