[project]
name = "mk-execution"
version = "0.1.0"
description = "Simulated order generation and fills for MK122 P1"
requires-python = ">=3.11"
dependencies = [
    "mk-data",
    "mk-strategies",
]

[tool.uv.sources]
mk-data = { workspace = true }
mk-strategies = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mk_execution"]
