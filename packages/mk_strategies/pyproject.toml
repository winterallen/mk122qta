[project]
name = "mk-strategies"
version = "0.1.0"
description = "Strategy actors and target portfolio generation for MK122 P1"
requires-python = ">=3.11"
dependencies = [
    "mk-data",
    "mk-signals",
]

[tool.uv.sources]
mk-data = { workspace = true }
mk-signals = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mk_strategies"]
