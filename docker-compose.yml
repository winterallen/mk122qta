services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.4
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin

  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: mk122
      MINIO_ROOT_PASSWORD: mk122-dev-password
    volumes:
      - minio-data:/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.15.1
    command: ["mlflow", "server", "--host", "0.0.0.0", "--port", "5000"]
    ports:
      - "5000:5000"

volumes:
  nats-data:
  minio-data:
